<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OptSolv Time Tracker</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --brand: #6366f1;
        --brand-dim: #4f46e5;
        --bg: #0f0f12;
        --surface: #1a1a22;
        --surface-2: #22222e;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f4f4f5;
        --muted: #71717a;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #eab308;
        --radius: 8px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
    <script type="module" src="./main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
